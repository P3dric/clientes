<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistema Nuzzi</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  
  <style>
    :root {
      --primary: #3b82f6;
      --dark: #0f172a;
      --gray: #334155;
      --light: #e2e8f0;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: var(--light);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 500px;
      margin: 2rem auto;
      background: #1e293b;
      padding: 2rem;
      border-radius: 12px;
      border: 1px solid var(--gray);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    h1 { text-align: center; margin-bottom: 1.5rem; }
    .tabs {
      display: flex;
      background: #334155;
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 1.5rem;
    }
    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
    }
    .tab.active {
      background: var(--primary);
      color: white;
    }
    .form-group {
      position: relative;
      margin-bottom: 1.5rem;
    }
    label { display: block; margin-bottom: 0.5rem; color: #94a3b8; }
    input, select {
      width: 100%;
      padding: 12px 12px 12px 42px;
      background: var(--dark);
      border: 1px solid var(--gray);
      border-radius: 8px;
      color: white;
    }
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="container">
  <h1>Sistema Nuzzi</h1>

  <!-- Abas -->
  <div class="tabs">
    <div class="tab active" data-tab="cliente">Cliente</div>
    <div class="tab" data-tab="compra">Compras</div>
  </div>

  <!-- Formulário Cliente -->
  <form id="formCliente" class="form-tab">
    <div class="form-group">
      <label>Nome completo</label>
      <input type="text" id="nome" placeholder="Ex: João Silva" required>
    </div>
    <button type="submit" class="btn-primary">Cadastrar Cliente</button>
  </form>

  <!-- Formulário Compras -->
  <form id="formCompra" class="form-tab hidden">
    <div class="form-group">
      <label>Seu Nome ou Telefone</label>
      <input type="text" id="clienteCompra" placeholder="Ex: João ou (41) 99999-9999" required>
    </div>
    <div class="form-group">
      <label>Produto</label>
      <select id="produtoCompra" required>
        <option value="">Selecione um produto...</option>
      </select>
    </div>
    <div class="form-group">
      <label>Quantidade</label>
      <input type="number" id="quantidadeCompra" min="1" value="1" required>
    </div>
    <div class="form-group">
      <label>Valor Total (R$)</label>
      <input type="text" id="valorTotalCompra" readonly style="background:#334155;">
    </div>
    <button type="submit" class="btn-primary">Registrar Compra</button>
  </form>
</div>

<script>
// Troca de abas
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');

    document.querySelectorAll('.form-tab').forEach(f => f.classList.add('hidden'));
    document.getElementById('form' + tab.dataset.tab.charAt(0).toUpperCase() + tab.dataset.tab.slice(1)).classList.remove('hidden');
  });
});

// Cadastro de Compra
document.getElementById('formCompra').addEventListener('submit', function(e) {
  e.preventDefault();
  alert("Compra registrada com sucesso! (Teste)");
  this.reset();
});

// Inicialização simples
</script>
</body>
</html>
