<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Clientes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #0a001f;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            background-image: radial-gradient(#9b4dca 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .container {
            position: relative;
            background-color: rgba(30, 0, 50, 0.9);
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            border: 2px solid #9b4dca;
            box-shadow: 0 0 25px #9b4dca, 0 0 50px #d27fff;
            margin-bottom: 20px;
        }

        h1 {
            margin-bottom: 25px;
            font-size: 28px;
            color: #d27fff;
            text-shadow: 0 0 8px #d27fff;
        }

        label {
            display: block;
            text-align: left;
            margin-bottom: 6px;
            color: #ddd;
            font-size: 15px;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="date"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border: 2px solid #9b4dca;
            border-radius: 6px;
            background-color: #2b0033;
            color: #fff;
            font-size: 15px;
        }

        input:focus {
            border-color: #d27fff;
            box-shadow: 0 0 12px #d27fff;
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #9b4dca, #c084fc);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(210,127,255,0.6);
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(210,127,255,0.9);
        }

        .confirmacao {
            position: relative;
            background: rgba(50,0,70,0.92);
            border: 2px solid #9b4dca;
            box-shadow: 0 0 30px #9b4dca;
            padding: 35px 25px;
            border-radius: 12px;
            width: 100%;
            max-width: 380px;
            margin-bottom: 30px;
            text-align: center;
            display: none;
        }

        .mensagem-sucesso {
            font-size: 18px;
            margin: 20px 0;
            color: #d0aaff;
        }

        #listaClientes {
            display: none;
            margin-top: 20px;
            text-align: left;
            max-height: 300px;
            overflow-y: auto;
            padding: 10px;
            border: 2px solid #84c4fc;
            border-radius: 8px;
            background-color: rgba(30,0,50,0.85);
        }

        @keyframes pisca {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .container::before,
        .confirmacao::before {
            content: '';
            position: absolute;
            width: 4px;
            height: 4px;
            background: #d27fff;
            border-radius: 50%;
            animation: pisca 4s infinite;
        }

        .container::before { top: 10%; left: 15%; }
        .confirmacao::before { bottom: 20%; right: 20%; }
    </style>
</head>
<body>

    <div class="confirmacao" id="confirmacao">
        <h1>Cadastro Realizado!</h1>
        <p class="mensagem-sucesso">As informações foram salvas com segurança.</p>
        <p style="color: #aaa; font-size: 14px; margin-top: 20px;">
            Os dados estão protegidos no seu navegador.<br>
            Para voltar e cadastrar outro cliente, clique abaixo.
        </p>
        <a href="#" id="voltarCadastro" style="color: #d27fff; font-weight: bold; text-decoration: none; margin-top: 25px; display: inline-block;">
            → Cadastrar novo cliente
        </a>
    </div>

    <div class="container">
        <h1>Cadastro de Cliente</h1>
        <form id="cadastroForm">
            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" placeholder="Digite o nome completo" required>

            <label for="email">E-mail:</label>
            <input type="email" id="email" placeholder="exemplo@dominio.com" required>

            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" placeholder="(41) 99999-9999" required>

            <label for="endereco">Endereço:</label>
            <input type="text" id="endereco" placeholder="Rua Exemplo, 123 - Bairro" required>

            <label for="dataNascimento">Data de Nascimento:</label>
            <input type="date" id="dataNascimento" required>

            <button type="submit">Cadastrar com Sigilo</button>
        </form>

        <button type="button" id="mostrarClientes" style="background: linear-gradient(135deg, #4d9bd2, #84c4fc); box-shadow: 0 0 15px rgba(132,196,252,0.6);">
            Mostrar todos os clientes
        </button>

        <div id="listaClientes">
            <!-- Lista de clientes aparecerá aqui -->
        </div>
    </div>

    <script>
        const form = document.getElementById('cadastroForm');
        const confirmacao = document.getElementById('confirmacao');
        const voltarCadastro = document.getElementById('voltarCadastro');
        const mostrarClientesBtn = document.getElementById('mostrarClientes');
        const listaClientesDiv = document.getElementById('listaClientes');

        // Função para salvar cliente no localStorage
        function salvarCliente(cliente) {
            let clientes = JSON.parse(localStorage.getItem('clientes')) || [];
            clientes.push(cliente);
            localStorage.setItem('clientes', JSON.stringify(clientes));
        }

        // Evento de cadastro
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const novoCliente = {
                nome: document.getElementById('nome').value.trim(),
                email: document.getElementById('email').value.trim(),
                telefone: document.getElementById('telefone').value.trim(),
                endereco: document.getElementById('endereco').value.trim(),
                dataNascimento: document.getElementById('dataNascimento').value,
                cadastradoEm: new Date().toISOString()
            };

            salvarCliente(novoCliente);

            // Mostra tela de sucesso e esconde formulário
            form.style.display = 'none';
            confirmacao.style.display = 'block';
        });

        // Voltar para cadastro
        voltarCadastro.addEventListener('click', function(e) {
            e.preventDefault();
            confirmacao.style.display = 'none';
            form.style.display = 'block';
            form.reset();
        });

        // Mostrar todos os clientes
        mostrarClientesBtn.addEventListener('click', function() {
            const clientes = JSON.parse(localStorage.getItem('clientes')) || [];

            if (clientes.length === 0) {
                listaClientesDiv.innerHTML = '<p style="color: #d27fff;">Nenhum cliente cadastrado ainda.</p>';
            } else {
                listaClientesDiv.innerHTML = '';
                clientes.forEach((cliente, index) => {
                    const clienteInfo = document.createElement('div');
                    clienteInfo.style.borderBottom = '1px solid #d27fff';
                    clienteInfo.style.padding = '8px 0';
                    clienteInfo.innerHTML = `
                        <strong>#${index + 1} - ${cliente.nome}</strong><br>
                        E-mail: ${cliente.email}<br>
                        Telefone: ${cliente.telefone}<br>
                        Endereço: ${cliente.endereco}<br>
                        Data de Nascimento: ${cliente.dataNascimento}<br>
                        Cadastrado em: ${new Date(cliente.cadastradoEm).toLocaleString()}
                    `;
                    listaClientesDiv.appendChild(clienteInfo);
                });
            }
