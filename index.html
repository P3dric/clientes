<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistema Nuzzi • Acesso Restrito</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  
  <style>
    :root {
      --primary: #3b82f6;
      --danger: #ef4444;
      --purple: #7c3aed;
      --success: #22c55e;
      --dark: #0f172a;
      --gray: #334155;
      --light: #e2e8f0;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: var(--light);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 520px;
      margin: 2rem auto;
      background: #1e293b;
      padding: 2rem;
      border-radius: 12px;
      border: 1px solid var(--gray);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    h1 { text-align: center; margin-bottom: 1.5rem; cursor: pointer; }
    .tabs {
      display: flex;
      background: #334155;
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 1.5rem;
    }
    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
    }
    .tab.active {
      background: var(--primary);
      color: white;
    }
    .form-group {
      position: relative;
      margin-bottom: 1.5rem;
    }
    label { display: block; margin-bottom: 0.5rem; color: #94a3b8; font-size: 0.95rem; }
    input, select {
      width: 100%;
      padding: 12px 12px 12px 42px;
      background: var(--dark);
      border: 1px solid var(--gray);
      border-radius: 8px;
      color: white;
      font-size: 1rem;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }
    .input-icon {
      position: absolute;
      left: 14px;
      top: 42px;
      color: #64748b;
      font-size: 1.1rem;
    }
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 1.05rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary:hover { background: #2563eb; transform: translateY(-2px); }
    .confirmacao {
      text-align: center;
      padding: 3rem 1rem;
      display: none;
    }
    .success-icon {
      font-size: 5rem;
      color: var(--success);
      margin-bottom: 1rem;
    }
    #areaAdmin {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1.8rem;
      margin-top: 2rem;
      display: none;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #475569;
    }
    th { background: #334155; color: #cbd5e1; }
    .admin-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 1.5rem 0;
    }
    .admin-buttons button {
      flex: 1;
      min-width: 130px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-size: 0.95rem;
    }
    #modalLoginAdmin {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background: #1e293b;
      padding: 2rem;
      border-radius: 12px;
      width: 90%;
      max-width: 420px;
      border: 1px solid #475569;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- Modal Login Admin -->
<div id="modalLoginAdmin">
  <div class="modal-content">
    <h3><i class="fas fa-user-shield"></i> Acesso Administrativo</h3>
    <input type="password" id="senhaAdmin" placeholder="Digite a senha administrativa" autocomplete="current-password">
    <div class="admin-buttons" style="margin-top: 1.5rem;">
      <button id="cancelarLogin" style="background:#475569;">Cancelar</button>
      <button id="confirmarLogin" style="background:var(--primary);">Entrar</button>
    </div>
    <p id="erroLogin" style="color:#ef4444; text-align:center; display:none;">Senha incorreta!</p>
  </div>
</div>

<!-- Tela de Sucesso -->
<div class="confirmacao" id="confirmacao">
  <div class="success-icon">✓</div>
  <h1 id="msgSucesso">Concluído!</h1>
  <p id="subMsg"></p>
  <button type="button" class="btn-primary" id="novoCadastro">Novo Registro</button>
</div>

<!-- ==================== TELA PRINCIPAL ==================== -->
<div class="container" id="mainContent">
  <h1 id="tituloAdminTrigger">Sistema Nuzzi</h1>

  <!-- Abas da tela principal -->
  <div class="tabs">
    <div class="tab active" data-tab="cliente">Cliente</div>
    <div class="tab" data-tab="compra">Compras</div>
  </div>

  <!-- Formulário Cadastro de Cliente -->
  <form id="cadastroFormCliente" class="form-tab">
    <div class="form-group">
      <label>Nome completo</label>
      <input type="text" id="nome" placeholder="Ex: João Silva" required>
      <i class="fas fa-user input-icon"></i>
    </div>
    <div class="form-group">
      <label>E-mail</label>
      <input type="email" id="email" placeholder="email@exemplo.com" required>
      <i class="fas fa-envelope input-icon"></i>
    </div>
    <div class="form-group">
      <label>Telefone / WhatsApp</label>
      <input type="tel" id="telefone" placeholder="(41) 99999-9999" required>
      <i class="fas fa-phone input-icon"></i>
    </div>
    <div class="form-group">
      <label>Endereço</label>
      <input type="text" id="endereco" placeholder="Rua, número, bairro, cidade" required>
      <i class="fas fa-map-marker-alt input-icon"></i>
    </div>
    <div class="form-group">
      <label>Data de nascimento</label>
      <input type="date" id="dataNascimento" required>
      <i class="fas fa-calendar-days input-icon"></i>
    </div>
    <button type="submit" class="btn-primary">Cadastrar Cliente</button>
  </form>

  <!-- Formulário de Compras -->
  <form id="cadastroFormCompra" class="form-tab hidden">
    <div class="form-group">
      <label>Seu Nome ou Telefone</label>
      <input type="text" id="clienteCompra" placeholder="Nome ou telefone para identificar" required>
      <i class="fas fa-user input-icon"></i>
    </div>
    <div class="form-group">
      <label>Produto</label>
      <select id="produtoCompra" required></select>
    </div>
    <div class="form-group">
      <label>Quantidade</label>
      <input type="number" id="quantidadeCompra" min="1" value="1" required>
    </div>
    <div class="form-group">
      <label>Valor Total (R$)</label>
      <input type="text" id="valorTotalCompra" readonly style="background:#334155;">
    </div>
    <button type="submit" class="btn-primary">Registrar Minha Compra</button>
  </form>

  <!-- ==================== ÁREA ADMINISTRATIVA ==================== -->
  <div id="areaAdmin">
    <h2><i class="fas fa-user-shield"></i> Área Administrativa</h2>
    <div class="admin-buttons">
      <button id="btnVerClientes" style="background:#3b82f6;">Ver Clientes</button>
      <button id="btnVerProdutos" style="background:#8b5cf6;">Ver Produtos</button>
      <button id="btnVerVendas"   style="background:#22c55e;">Ver Vendas</button>
      <button id="btnVerCompras"  style="background:#eab308;">Ver Compras</button>
      <button id="btnNovoProduto" style="background:var(--purple);">+ Novo Produto</button>
      <button id="btnLimparDados" style="background:var(--danger);">Limpar Tudo</button>
      <button id="sairAdmin" style="background:#475569;">Sair</button>
    </div>
    <div id="conteudoAdmin"></div>
  </div>
</div>

<script>
// ====================== CONFIGURAÇÕES ======================
const SENHA_ADMIN = "clientesnuzzi26";

// ====================== ELEMENTOS ======================
const tituloAdminTrigger = document.getElementById('tituloAdminTrigger');
const modalLogin = document.getElementById('modalLoginAdmin');
const senhaAdminInput = document.getElementById('senhaAdmin');
const confirmarLogin = document.getElementById('confirmarLogin');
const cancelarLogin = document.getElementById('cancelarLogin');
const erroLogin = document.getElementById('erroLogin');
const areaAdmin = document.getElementById('areaAdmin');
const conteudoAdmin = document.getElementById('conteudoAdmin');

// Tabs
const tabs = document.querySelectorAll('.tab');
const forms = {
  cliente: document.getElementById('cadastroFormCliente'),
  compra:  document.getElementById('cadastroFormCompra')
};

// Sucesso
const confirmacao = document.getElementById('confirmacao');
const msgSucesso = document.getElementById('msgSucesso');
const subMsg = document.getElementById('subMsg');
const novoCadastroBtn = document.getElementById('novoCadastro');

// ====================== MÁSCARA TELEFONE ======================
document.getElementById('telefone').addEventListener('input', function(e) {
  let v = e.target.value.replace(/\D/g, '');
  if (v.length > 11) v = v.slice(0,11);
  v = v.replace(/^(\d{2})(\d)/, '($1) $2');
  v = v.replace(/(\d{5})(\d{4})$/, '$1-$2');
  e.target.value = v;
});

// ====================== TROCA DE ABAS ======================
tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    tabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    Object.values(forms).forEach(f => f.classList.add('hidden'));
    forms[tab.dataset.tab].classList.remove('hidden');
  });
});

// ====================== LOGIN ADMIN ======================
function abrirModalAdmin() {
  modalLogin.style.display = 'flex';
  senhaAdminInput.value = '';
  erroLogin.style.display = 'none';
  senhaAdminInput.focus();
}

function tentarLogin() {
  if (senhaAdminInput.value === SENHA_ADMIN) {
    modalLogin.style.display = 'none';
    areaAdmin.style.display = 'block';
    tituloAdminTrigger.style.color = '#f87171';
  } else {
    erroLogin.style.display = 'block';
    senhaAdminInput.value = '';
    senhaAdminInput.focus();
  }
}

tituloAdminTrigger.addEventListener('click', abrirModalAdmin);
confirmarLogin.addEventListener('click', tentarLogin);
senhaAdminInput.addEventListener('keypress', e => { if(e.key === 'Enter') tentarLogin(); });
cancelarLogin.addEventListener('click', () => modalLogin.style.display = 'none');

document.getElementById('sairAdmin').addEventListener('click', () => {
  areaAdmin.style.display = 'none';
  tituloAdminTrigger.style.color = '';
  conteudoAdmin.innerHTML = '';
});

// ====================== SALVAR / CARREGAR ======================
function salvarDados(chave, dados) {
  localStorage.setItem(chave, JSON.stringify(dados));
}

function carregarDados(chave) {
  return JSON.parse(localStorage.getItem(chave) || '[]');
}

// ====================== CADASTRO CLIENTE ======================
forms.cliente.addEventListener('submit', e => {
  e.preventDefault();
  const cliente = {
    id: Date.now(),
    nome: document.getElementById('nome').value.trim(),
    email: document.getElementById('email').value.trim(),
    telefone: document.getElementById('telefone').value.trim(),
    endereco: document.getElementById('endereco').value.trim(),
    dataNascimento: document.getElementById('dataNascimento').value,
    cadastradoEm: new Date().toISOString()
  };
  let clientes = carregarDados('clientes_v2');
  clientes.push(cliente);
  salvarDados('clientes_v2', clientes);
  mostrarSucesso("Cliente cadastrado com sucesso!", "Dados salvos no navegador.");
  forms.cliente.reset();
});

// ====================== CADASTRO DE COMPRA ======================
const selectProdutoCompra = document.getElementById('produtoCompra');
const quantidadeCompra = document.getElementById('quantidadeCompra');
const valorTotalCompra = document.getElementById('valorTotalCompra');

function atualizarProdutosCompra() {
  selectProdutoCompra.innerHTML = '<option value="">Selecione o produto...</option>';
  carregarDados('produtos').forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = `${p.nome} - R$ ${p.preco.toFixed(2)} (Estoque: ${p.estoque})`;
    selectProdutoCompra.appendChild(opt);
  });
}

selectProdutoCompra.addEventListener('change', atualizarValorCompra);
quantidadeCompra.addEventListener('input', atualizarValorCompra);

function atualizarValorCompra() {
  const produtos = carregarDados('produtos');
  const produto = produtos.find(p => p.id == selectProdutoCompra.value);
  if (produto) {
    const qtd = parseInt(quantidadeCompra.value) || 1;
    valorTotalCompra.value = `R$ ${(produto.preco * qtd).toFixed(2)}`;
  } else {
    valorTotalCompra.value = '';
  }
}

forms.compra.addEventListener('submit', e => {
  e.preventDefault();
  const nomeCliente = document.getElementById('clienteCompra').value.trim();
  const produtoId = parseInt(selectProdutoCompra.value);
  const quantidade = parseInt(quantidadeCompra.value);

  const produtos = carregarDados('produtos');
  const produto = produtos.find(p => p.id === produtoId);

  if (!produto || quantidade < 1 || quantidade > produto.estoque) {
    alert("Produto inválido ou estoque insuficiente!");
    return;
  }

  const compra = {
    id: Date.now(),
    cliente: nomeCliente,
    produtoNome: produto.nome,
    quantidade: quantidade,
    precoUnitario: produto.preco,
    valorTotal: produto.preco * quantidade,
    data: new Date().toISOString()
  };

  let compras = carregarDados('compras');
  compras.push(compra);
  salvarDados('compras', compras);

  produto.estoque -= quantidade;
  salvarDados('produtos', produtos);

  mostrarSucesso("Compra registrada com sucesso!", `Total: R$ ${compra.valorTotal.toFixed(2)}`);
  forms.compra.reset();
  atualizarProdutosCompra();
});

// ====================== VISUALIZAÇÃO NO ADMIN ======================
function mostrarClientes() {
  const clientes = carregarDados('clientes_v2');
  let html = `<h3>Clientes Cadastrados (${clientes.length})</h3>`;
  if (clientes.length === 0) {
    html += `<p style="text-align:center; padding:2rem; color:#94a3b8;">Nenhum cliente cadastrado.</p>`;
  } else {
    html += `<table><thead><tr><th>Nome</th><th>Email</th><th>Telefone</th><th>Data</th></tr></thead><tbody>`;
    clientes.forEach(c => {
      html += `<tr><td>${c.nome}</td><td>${c.email}</td><td>${c.telefone}</td><td>${new Date(c.cadastradoEm).toLocaleDateString('pt-BR')}</td></tr>`;
    });
    html += `</tbody></table>`;
  }
  conteudoAdmin.innerHTML = html;
}

function mostrarProdutos() {
  const produtos = carregarDados('produtos');
  let html = `<h3>Produtos Cadastrados (${produtos.length})</h3>`;
  if (produtos.length === 0) {
    html += `<p style="text-align:center; padding:2rem; color:#94a3b8;">Nenhum produto cadastrado.</p>`;
  } else {
    html += `<table><thead><tr><th>Produto</th><th>Categoria</th><th>Preço</th><th>Estoque</th></tr></thead><tbody>`;
    produtos.forEach(p => {
      html += `<tr><td>${p.nome}</td><td>${p.categoria}</td><td>R$ ${p.preco.toFixed(2)}</td><td><strong>${p.estoque}</strong></td></tr>`;
    });
    html += `</tbody></table>`;
  }
  conteudoAdmin.innerHTML = html;
}

function mostrarVendas() {
  const vendas = carregarDados('vendas');
  let html = `<h3>Vendas Registradas (${vendas.length})</h3>`;
  if (vendas.length === 0) html += `<p style="text-align:center; padding:2rem; color:#94a3b8;">Nenhuma venda registrada.</p>`;
  else {
    html += `<table><thead><tr><th>Data</th><th>Cliente</th><th>Produto</th><th>Qtd</th><th>Total</th></tr></thead><tbody>`;
    vendas.sort((a,b) => new Date(b.dataVenda) - new Date(a.dataVenda));
    vendas.forEach(v => {
      html += `<tr><td>${new Date(v.dataVenda).toLocaleDateString('pt-BR')}</td><td>${v.clienteNome}</td><td>${v.produtoNome}</td><td>${v.quantidade}</td><td>R$ ${v.valorTotal.toFixed(2)}</td></tr>`;
    });
    html += `</tbody></table>`;
  }
  conteudoAdmin.innerHTML = html;
}

function mostrarCompras() {
  const compras = carregarDados('compras');
  let html = `<h3>Compras Registradas (${compras.length})</h3>`;
  if (compras.length === 0) html += `<p style="text-align:center; padding:2rem; color:#94a3b8;">Nenhuma compra registrada.</p>`;
  else {
    html += `<table><thead><tr><th>Data</th><th>Cliente</th><th>Produto</th><th>Qtd</th><th>Total</th></tr></thead><tbody>`;
    compras.sort((a,b) => new Date(b.data) - new Date(a.data));
    compras.forEach(c => {
      html += `<tr><td>${new Date(c.data).toLocaleDateString('pt-BR')}</td><td>${c.cliente}</td><td>${c.produtoNome}</td><td>${c.quantidade}</td><td>R$ ${c.valorTotal.toFixed(2)}</td></tr>`;
    });
    html += `</tbody></table>`;
  }
  conteudoAdmin.innerHTML = html;
}

// Botões Admin
document.getElementById('btnVerClientes').addEventListener('click', () => { conteudoAdmin.innerHTML = ''; mostrarClientes(); });
document.getElementById('btnVerProdutos').addEventListener('click', () => { conteudoAdmin.innerHTML = ''; mostrarProdutos(); });
document.getElementById('btnVerVendas').addEventListener('click', () => { conteudoAdmin.innerHTML = ''; mostrarVendas(); });
document.getElementById('btnVerCompras').addEventListener('click', () => { conteudoAdmin.innerHTML = ''; mostrarCompras(); });
document.getElementById('btnNovoProduto').addEventListener('click', () => {
  alert("O cadastro de produtos está em um arquivo separado.\n\nAbra o arquivo: cadastro-produtos.html");
});

document.getElementById('btnLimparDados').addEventListener('click', () => {
  if (confirm('⚠️ DESEJA APAGAR TODOS OS DADOS?\n\nEsta ação é irreversível!')) {
    localStorage.clear();
    alert('Todos os dados foram apagados.');
    conteudoAdmin.innerHTML = '';
    atualizarProdutosCompra();
  }
});

// ====================== FUNÇÕES AUXILIARES ======================
function mostrarSucesso(titulo, subtitulo) {
  msgSucesso.textContent = titulo;
  subMsg.textContent = subtitulo;
  Object.values(forms).forEach(f => f.classList.add('hidden'));
  confirmacao.style.display = 'block';
}

novoCadastroBtn.addEventListener('click', () => {
  confirmacao.style.display = 'none';
  forms.cliente.classList.remove('hidden');
  tabs[0].classList.add('active');
  tabs[1].classList.remove('active');
});

// Inicialização
atualizarProdutosCompra();
</script>
</body>
</html>
