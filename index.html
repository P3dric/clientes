<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistema Nuzzi • Acesso Restrito</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  
  <style>
    :root {
      --primary: #3b82f6;
      --danger: #ef4444;
      --purple: #7c3aed;
      --success: #22c55e;
      --dark: #0f172a;
      --gray: #334155;
      --light: #e2e8f0;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: var(--light);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 520px;
      margin: 2rem auto;
      background: #1e293b;
      padding: 2rem;
      border-radius: 12px;
      border: 1px solid var(--gray);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    h1 { text-align: center; margin-bottom: 1.5rem; cursor: pointer; }
    .tabs { display: flex; background: #334155; border-radius: 8px; padding: 4px; margin-bottom: 1.5rem; }
    .tab { flex: 1; padding: 12px; text-align: center; border-radius: 6px; cursor: pointer; font-weight: 500; }
    .tab.active { background: var(--primary); color: white; }
    .form-group { position: relative; margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: 0.5rem; color: #94a3b8; font-size: 0.95rem; }
    .required { color: #ef4444; }
    .help-text {
      font-size: 0.85rem;
      color: #64748b;
      margin-top: 4px;
    }
    input, select {
      width: 100%;
      padding: 12px 12px 12px 42px;
      background: var(--dark);
      border: 1px solid var(--gray);
      border-radius: 8px;
      color: white;
      font-size: 1rem;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }
    .input-icon {
      position: absolute;
      left: 14px;
      top: 42px;
      color: #64748b;
      font-size: 1.1rem;
    }
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 1.05rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary:hover { background: #2563eb; transform: translateY(-2px); }
    .confirmacao { text-align: center; padding: 3rem 1rem; display: none; }
    .success-icon { font-size: 5rem; color: var(--success); margin-bottom: 1rem; }
    #areaAdmin {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1.8rem;
      margin-top: 2rem;
      display: none;
    }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #475569; }
    th { background: #334155; color: #cbd5e1; }
    .admin-buttons { display: flex; gap: 8px; flex-wrap: wrap; margin: 1.5rem 0; }
    .admin-buttons button {
      flex: 1; min-width: 130px; padding: 12px; border: none; border-radius: 8px;
      color: white; cursor: pointer; font-size: 0.95rem;
    }
    #modalLoginAdmin {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      align-items: center; justify-content: center; z-index: 1000;
    }
    .modal-content {
      background: #1e293b; padding: 2rem; border-radius: 12px;
      width: 90%; max-width: 420px; border: 1px solid #475569;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- Modal Login Admin e Tela de Sucesso permanecem iguais (não alterados) -->

<div class="container" id="mainContent">
  <h1 id="tituloAdminTrigger">Sistema Nuzzi</h1>

  <!-- Abas -->
  <div class="tabs">
    <div class="tab active" data-tab="cliente">Cliente</div>
    <div class="tab" data-tab="compra">Compras</div>
  </div>

  <!-- ==================== CADASTRO DE CLIENTE ==================== -->
  <form id="cadastroFormCliente" class="form-tab">
    <div class="form-group">
      <label>Nome completo <span class="required">*</span></label>
      <input type="text" id="nome" placeholder="Ex: João Silva dos Santos" maxlength="80" required>
      <i class="fas fa-user input-icon"></i>
    </div>

    <div class="form-group">
      <label>CPF <span class="required">*</span></label>
      <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
      <i class="fas fa-id-card input-icon"></i>
    </div>

    <div class="form-group">
      <label>RG <span class="required">*</span></label>
      <input type="text" id="rg" placeholder="00.000.000-0" maxlength="12" required>
      <i class="fas fa-id-badge input-icon"></i>
    </div>

    <div class="form-group">
      <label>E-mail <span class="required">*</span></label>
      <input type="email" id="email" placeholder="seunome@gmail.com" maxlength="80" required>
      <i class="fas fa-envelope input-icon"></i>
      <div class="help-text">Preferencialmente use um endereço Gmail</div>
    </div>

    <div class="form-group">
      <label>Telefone / WhatsApp <span class="required">*</span></label>
      <input type="tel" id="telefone" placeholder="(41) 99999-9999" maxlength="15" required>
      <i class="fas fa-phone input-icon"></i>
    </div>

    <div class="form-group">
      <label>Endereço</label>
      <input type="text" id="endereco" placeholder="Rua, número, bairro, cidade" maxlength="120">
      <i class="fas fa-map-marker-alt input-icon"></i>
    </div>

    <div class="form-group">
      <label>Data de nascimento</label>
      <input type="date" id="dataNascimento">
      <i class="fas fa-calendar-days input-icon"></i>
    </div>

    <button type="submit" class="btn-primary">Cadastrar Cliente</button>
  </form>

  <!-- ==================== CADASTRO DE COMPRAS ==================== -->
  <form id="cadastroFormCompra" class="form-tab hidden">
    <div class="form-group">
      <label>Nome do Cliente <span class="required">*</span></label>
      <input type="text" id="clienteCompra" placeholder="Nome completo" maxlength="80" required>
      <i class="fas fa-user input-icon"></i>
    </div>

    <div class="form-group">
      <label>Telefone / WhatsApp <span class="required">*</span></label>
      <input type="tel" id="telefoneCompra" placeholder="(41) 99999-9999" maxlength="15" required>
      <i class="fas fa-phone input-icon"></i>
    </div>

    <div class="form-group">
      <label>Produto <span class="required">*</span></label>
      <select id="produtoCompra" required></select>
    </div>

    <div class="form-group">
      <label>Quantidade <span class="required">*</span></label>
      <input type="number" id="quantidadeCompra" min="1" value="1" required>
    </div>

    <div class="form-group">
      <label>Valor Total (R$)</label>
      <input type="text" id="valorTotalCompra" readonly style="background:#334155;">
    </div>

    <button type="submit" class="btn-primary">Registrar Compra</button>
  </form>

  <!-- Área Administrativa (mantida igual) -->
  <div id="areaAdmin">
    <h2><i class="fas fa-user-shield"></i> Área Administrativa</h2>
    <div class="admin-buttons">
      <button id="btnVerClientes" style="background:#3b82f6;">Ver Clientes</button>
      <button id="btnVerProdutos" style="background:#8b5cf6;">Ver Produtos</button>
      <button id="btnVerVendas"   style="background:#22c55e;">Ver Vendas</button>
      <button id="btnVerCompras"  style="background:#eab308;">Ver Compras</button>
      <button id="btnNovoProduto" style="background:var(--purple);">+ Novo Produto</button>
      <button id="btnLimparDados" style="background:var(--danger);">Limpar Tudo</button>
      <button id="sairAdmin" style="background:#475569;">Sair</button>
    </div>

    <div id="formNovoProduto" class="hidden">
      <!-- Formulário de novo produto (mantido igual ao anterior) -->
    </div>

    <div id="conteudoAdmin"></div>
  </div>
</div>

<script>
// ====================== CONFIGURAÇÕES ======================
const SENHA_ADMIN = "clientesnuzzi26";

// ====================== MÁSCARA DE TELEFONE ======================
function aplicarMascaraTelefone(input) {
  input.addEventListener('input', function(e) {
    let valor = e.target.value.replace(/\D/g, '');
    if (valor.length > 11) valor = valor.substring(0, 11);

    if (valor.length <= 2) {
      e.target.value = valor;
    } else if (valor.length <= 7) {
      e.target.value = `(${valor.slice(0,2)}) ${valor.slice(2)}`;
    } else {
      e.target.value = `(${valor.slice(0,2)}) ${valor.slice(2,7)}-${valor.slice(7)}`;
    }
  });
}

// ====================== ELEMENTOS ======================
const forms = {
  cliente: document.getElementById('cadastroFormCliente'),
  compra:  document.getElementById('cadastroFormCompra')
};

// Aplicar máscara nos telefones
aplicarMascaraTelefone(document.getElementById('telefone'));
aplicarMascaraTelefone(document.getElementById('telefoneCompra'));

// ====================== TROCA DE ABAS ======================
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    Object.values(forms).forEach(f => f.classList.add('hidden'));
    forms[tab.dataset.tab].classList.remove('hidden');
  });
});

// ====================== CADASTRO DE CLIENTE ======================
forms.cliente.addEventListener('submit', e => {
  e.preventDefault();

  const email = document.getElementById('email').value.trim();
  const telefone = document.getElementById('telefone').value.trim();

  if (!email.includes('@')) {
    alert("Por favor, informe um e-mail válido.");
    return;
  }
  if (telefone.replace(/\D/g, '').length < 11) {
    alert("Telefone inválido! Use o formato (41) 99999-9999");
    return;
  }

  const cliente = {
    id: Date.now(),
    nome: document.getElementById('nome').value.trim(),
    cpf: document.getElementById('cpf').value.trim(),
    rg: document.getElementById('rg').value.trim(),
    email: email,
    telefone: telefone,
    endereco: document.getElementById('endereco').value.trim(),
    dataNascimento: document.getElementById('dataNascimento').value,
    cadastradoEm: new Date().toISOString()
  };

  let clientes = JSON.parse(localStorage.getItem('clientes_v2') || '[]');
  clientes.push(cliente);
  localStorage.setItem('clientes_v2', JSON.stringify(clientes));

  mostrarSucesso("Cliente cadastrado com sucesso!", "Dados salvos no navegador.");
  forms.cliente.reset();
});

// ====================== CADASTRO DE COMPRA ======================
const selectProdutoCompra = document.getElementById('produtoCompra');
const quantidadeCompra = document.getElementById('quantidadeCompra');
const valorTotalCompra = document.getElementById('valorTotalCompra');

function atualizarProdutosCompra() {
  selectProdutoCompra.innerHTML = '<option value="">Selecione o produto...</option>';
  const produtos = JSON.parse(localStorage.getItem('produtos') || '[]');
  
  const comEstoque = produtos.filter(p => p.estoque > 0).sort((a,b) => a.nome.localeCompare(b.nome));

  comEstoque.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = `${p.nome} - R$ ${p.preco.toFixed(2)} (Estoque: ${p.estoque})`;
    selectProdutoCompra.appendChild(opt);
  });

  if (comEstoque.length === 0) {
    const opt = document.createElement('option');
    opt.textContent = "Nenhum produto em estoque";
    opt.disabled = true;
    selectProdutoCompra.appendChild(opt);
  }
}

function atualizarValorCompra() {
  const produtos = JSON.parse(localStorage.getItem('produtos') || '[]');
  const produto = produtos.find(p => p.id == selectProdutoCompra.value);
  if (produto) {
    const qtd = parseInt(quantidadeCompra.value) || 1;
    valorTotalCompra.value = `R$ ${(produto.preco * qtd).toFixed(2)}`;
  } else {
    valorTotalCompra.value = '';
  }
}

selectProdutoCompra.addEventListener('change', atualizarValorCompra);
quantidadeCompra.addEventListener('input', atualizarValorCompra);

forms.compra.addEventListener('submit', e => {
  e.preventDefault();

  const nomeCliente = document.getElementById('clienteCompra').value.trim();
  const telefoneCliente = document.getElementById('telefoneCompra').value.trim();
  const produtoId = parseInt(selectProdutoCompra.value);
  const quantidade = parseInt(quantidadeCompra.value) || 1;

  if (!nomeCliente) return alert("Informe o nome do cliente.");
  if (telefoneCliente.replace(/\D/g, '').length < 11) {
    return alert("Telefone inválido! Use o formato (41) 99999-9999");
  }

  const produtos = JSON.parse(localStorage.getItem('produtos') || '[]');
  const produto = produtos.find(p => p.id === produtoId);

  if (!produto) return alert("Selecione um produto válido.");
  if (quantidade > produto.estoque) return alert(`Estoque insuficiente! Disponível: ${produto.estoque}`);

  const compra = {
    id: Date.now(),
    cliente: nomeCliente,
    telefone: telefoneCliente,
    produtoNome: produto.nome,
    quantidade,
    precoUnitario: produto.preco,
    valorTotal: produto.preco * quantidade,
    data: new Date().toISOString()
  };

  let compras = JSON.parse(localStorage.getItem('compras') || '[]');
  compras.push(compra);
  localStorage.setItem('compras', JSON.stringify(compras));

  produto.estoque -= quantidade;
  localStorage.setItem('produtos', JSON.stringify(produtos));

  mostrarSucesso("Compra registrada com sucesso!", `${quantidade}x ${produto.nome} • ${telefoneCliente}`);

  forms.compra.reset();
  atualizarProdutosCompra();
});

// ====================== FUNÇÃO DE SUCESSO ======================
function mostrarSucesso(titulo, subtitulo) {
  document.getElementById('msgSucesso').textContent = titulo;
  document.getElementById('subMsg').textContent = subtitulo;
  Object.values(forms).forEach(f => f.classList.add('hidden'));
  document.getElementById('confirmacao').style.display = 'block';
}

// ====================== INICIALIZAÇÃO ======================
atualizarProdutosCompra();
</script>
</body>
</html>
