<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro de Clientes • Sigiloso</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <!-- Seu arquivo de estilos -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Tela de confirmação (sucesso) -->
<div class="confirmacao" id="confirmacao" style="display: none;">
  <div class="success-icon">✓</div>
  <h1>Cadastro Concluído!</h1>
  <p class="mensagem-sucesso">Cliente registrado com segurança no seu navegador.</p>
  <p style="color: #a3c4ff; font-size: 0.95rem; margin: 1rem 0 1.5rem;">
    Os dados estão salvos localmente.<br>Para cadastrar outro, clique abaixo.
  </p>
  <button type="button" class="btn-primary" id="novoCadastro">
    Cadastrar Novo Cliente
  </button>
</div>

<div class="container">
  <!-- Título → gatilho secreto para modo admin -->
  <h1 id="tituloAdminTrigger" style="cursor: pointer; user-select: none;">
    Cadastro de Cliente
  </h1>

  <!-- Formulário de cadastro -->
  <form id="cadastroForm">
    <div class="form-group">
      <label for="nome">Nome completo</label>
      <input type="text" id="nome" placeholder="Ex: Pedro Almeida Santos" required>
      <i class="fas fa-user input-icon"></i>
    </div>

    <div class="form-group">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="seuemail@exemplo.com" required>
      <i class="fas fa-envelope input-icon"></i>
    </div>

    <div class="form-group">
      <label for="telefone">Telefone / WhatsApp</label>
      <input type="tel" id="telefone" placeholder="(41) 99999-9999" pattern=".{14,15}" required>
      <i class="fas fa-phone input-icon"></i>
    </div>

    <div class="form-group">
      <label for="endereco">Endereço</label>
      <input type="text" id="endereco" placeholder="Rua das Flores, 198 - Centro" required>
      <i class="fas fa-home input-icon"></i>
    </div>

    <div class="form-group">
      <label for="dataNascimento">Data de nascimento</label>
      <input type="date" id="dataNascimento" required>
      <i class="fas fa-calendar-days input-icon"></i>
    </div>

    <button type="submit" class="btn-primary">Cadastrar com Sigilo</button>
  </form>

  <!-- Área administrativa – aparece só após o gatilho -->
  <div id="areaAdmin" style="display: none; margin-top: 3rem; padding: 1.5rem; background: #1e293b; border-radius: 12px; border: 1px solid #334155; color: #e2e8f0;">
    <h2 style="margin-top: 0; color: #f87171;">
      <i class="fas fa-user-shield"></i> Área Administrativa
    </h2>
    <p style="color: #94a3b8; margin-bottom: 1.5rem;">
      Acesso restrito • Apenas administradores
    </p>

    <div style="display: flex; gap: 12px; flex-wrap: wrap;">
      <button id="btnVerClientes" class="btn-primary" style="background: #f87171; border-color: #ef4444;">
        <i class="fas fa-list"></i> Ver Todos os Clientes
      </button>

      <button id="btnLimparDados" class="btn-primary" style="background: #7c3aed; border-color: #6d28d9;">
        <i class="fas fa-trash-alt"></i> Limpar Todos os Dados
      </button>

      <button id="sairAdmin" class="btn-primary" style="background: #475569; border-color: #334155;">
        <i class="fas fa-sign-out-alt"></i> Sair do Modo Admin
      </button>
    </div>

    <!-- Área onde a lista de clientes será exibida -->
    <div id="listaClientes" style="margin-top: 2rem; display: none;">
      <h3 style="color: #60a5fa;">Clientes Cadastrados</h3>
      <div id="clientesTable"></div>
    </div>
  </div>
</div>

<script>
// ────────────────────────────────────────────────
// Máscara de telefone brasileira (11 dígitos)
// ────────────────────────────────────────────────
document.getElementById('telefone').addEventListener('input', function(e) {
  let v = e.target.value.replace(/\D/g, '');
  if (v.length > 11) v = v.substring(0, 11);
  v = v.replace(/^(\d{2})(\d)/g, '($1) $2');
  v = v.replace(/(\d)(\d{4})$/, '$1-$2');
  e.target.value = v;
});

// ────────────────────────────────────────────────
// Funções básicas de cadastro
// ────────────────────────────────────────────────
const form = document.getElementById('cadastroForm');
const confirmacao = document.getElementById('confirmacao');
const novoCadastroBtn = document.getElementById('novoCadastro');

function salvarCliente(cliente) {
  let clientes = JSON.parse(localStorage.getItem('clientes_v2') || '[]');
  clientes.push(cliente);
  localStorage.setItem('clientes_v2', JSON.stringify(clientes));
}

form.addEventListener('submit', e => {
  e.preventDefault();

  const cliente = {
    nome: document.getElementById('nome').value.trim(),
    email: document.getElementById('email').value.trim(),
    telefone: document.getElementById('telefone').value.trim(),
    endereco: document.getElementById('endereco').value.trim(),
    dataNascimento: document.getElementById('dataNascimento').value,
    cadastradoEm: new Date().toISOString()
  };

  if (!cliente.nome || !cliente.email || !cliente.telefone || !cliente.endereco || !cliente.dataNascimento) {
    alert('Por favor, preencha todos os campos.');
    return;
  }

  salvarCliente(cliente);
  form.reset();
  form.style.display = 'none';
  confirmacao.style.display = 'block';
});

novoCadastroBtn.addEventListener('click', () => {
  confirmacao.style.display = 'none';
  form.style.display = 'block';
});

// ────────────────────────────────────────────────
// Acesso admin secreto: 5 cliques rápidos no título
// ────────────────────────────────────────────────
const titulo = document.getElementById('tituloAdminTrigger');
const areaAdmin = document.getElementById('areaAdmin');
const sairAdminBtn = document.getElementById('sairAdmin');
const btnVerClientes = document.getElementById('btnVerClientes');
const btnLimparDados = document.getElementById('btnLimparDados');
const listaClientes = document.getElementById('listaClientes');
const clientesTable = document.getElementById('clientesTable');

let cliqueCount = 0;
const CLIQUES_NECESSARIOS = 5;
const TEMPO_RESET = 1800; // ~1.8 segundos para resetar contagem

let timer;

titulo.addEventListener('click', () => {
  cliqueCount++;
  clearTimeout(timer);
  timer = setTimeout(() => { cliqueCount = 0; }, TEMPO_RESET);

  if (cliqueCount >= CLIQUES_NECESSARIOS) {
    areaAdmin.style.display = 'block';
    titulo.style.color = '#f87171';
    titulo.style.transition = 'color 0.4s';
    cliqueCount = 0;
  }
});

sairAdminBtn.addEventListener('click', () => {
  areaAdmin.style.display = 'none';
  listaClientes.style.display = 'none';
  titulo.style.color = '';
});

// Ver todos os clientes
btnVerClientes.addEventListener('click', () => {
  const clientes = JSON.parse(localStorage.getItem('clientes_v2') || '[]');

  if (clientes.length === 0) {
    clientesTable.innerHTML = '<p style="color: #94a3b8;">Nenhum cliente cadastrado ainda.</p>';
  } else {
    let html = '<table style="width:100%; border-collapse: collapse; margin-top: 1rem;">';
    html += '<thead><tr style="background:#334155;"><th style="padding:10px;">Nome</th><th>Email</th><th>Telefone</th><th>Data Cad.</th></tr></thead>';
    html += '<tbody>';

    clientes.forEach(c => {
      const data = new Date(c.cadastradoEm).toLocaleDateString('pt-BR');
      html += `<tr style="border-bottom:1px solid #475569;">
        <td style="padding:10px;">${c.nome}</td>
        <td>${c.email}</td>
        <td>${c.telefone}</td>
        <td>${data}</td>
      </tr>`;
    });

    html += '</tbody></table>';
    clientesTable.innerHTML = html;
  }

  listaClientes.style.display = 'block';
});

// Limpar todos os dados (com confirmação)
btnLimparDados.addEventListener('click', () => {
  if (confirm('Tem certeza que deseja APAGAR TODOS os clientes salvos? Essa ação não pode ser desfeita.')) {
    localStorage.removeItem('clientes_v2');
    alert('Todos os dados foram apagados.');
    listaClientes.style.display = 'none';
    clientesTable.innerHTML = '';
  }
});
</script>

</body>
</html>
