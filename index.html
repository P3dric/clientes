<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro de Clientes • Acesso Restrito</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  
  <style>
    :root {
      --primary: #3b82f6;
      --danger: #ef4444;
      --purple: #7c3aed;
      --dark: #0f172a;
      --gray: #334155;
      --light: #e2e8f0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      /* Fundo que você mandou */
      background: url('https://static.vecteezy.com/ti/vetor-gratis/p1/5843413-resumo-ciber-seguranca-privacidade-informacao.jpg') no-repeat center center fixed;
      background-size: cover;
      color: var(--light);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }

    /* Overlay escuro semi-transparente para melhorar legibilidade */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.85); /* tom escuro com transparência */
      z-index: -1;
    }

    .container {
      max-width: 420px;
      margin: 2rem auto;
      background: rgba(30, 41, 59, 0.95); /* fundo do card um pouco mais transparente */
      padding: 2rem;
      border-radius: 12px;
      border: 1px solid var(--gray);
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    /* resto do CSS permanece igual ao que você enviou */
    h1 {
      text-align: center;
      margin-bottom: 1.5rem;
      cursor: pointer;
      transition: color 0.3s;
    }

    .form-group {
      position: relative;
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      color: #94a3b8;
      font-size: 0.95rem;
    }

    input {
      width: 100%;
      padding: 12px 12px 12px 42px;
      background: var(--dark);
      border: 1px solid var(--gray);
      border-radius: 8px;
      color: white;
      font-size: 1rem;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 42px;
      color: #64748b;
      font-size: 1.1rem;
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 1.05rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary:hover {
      background: #2563eb;
      transform: translateY(-2px);
    }

    .error-message {
      color: var(--danger);
      text-align: center;
      margin: 1rem 0;
      display: none;
    }

    .confirmacao {
      text-align: center;
      padding: 3rem 1rem;
      display: none;
    }

    .success-icon {
      font-size: 5rem;
      color: #22c55e;
      margin-bottom: 1rem;
    }

    #areaAdmin {
      background: rgba(30, 41, 59, 0.95);
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1.8rem;
      margin-top: 2rem;
      display: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }

    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #475569;
    }

    th {
      background: #334155;
      color: #cbd5e1;
    }

    .admin-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 1.5rem 0;
    }

    .admin-buttons button {
      flex: 1;
      min-width: 160px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-size: 1rem;
    }

    #modalLoginAdmin {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-content {
      background: #1e293b;
      padding: 2rem;
      border-radius: 12px;
      width: 90%;
      max-width: 420px;
      border: 1px solid #475569;
    }
  </style>
</head>
<body>

<!-- Todo o resto do HTML e o <script> permanecem exatamente iguais ao que você enviou -->

<!-- Modal de login admin -->
<div id="modalLoginAdmin">
  <div class="modal-content">
    <h3>Acesso Administrativo</h3>
    <input type="password" id="senhaAdmin" placeholder="Digite a senha administrativa" autocomplete="current-password">
    <div class="admin-buttons" style="margin-top: 1.5rem;">
      <button id="cancelarLogin" style="background:#475569;">Cancelar</button>
      <button id="confirmarLogin" style="background:var(--primary);">Entrar</button>
    </div>
    <p id="erroLogin" class="error-message">Senha incorreta. Tente novamente.</p>
  </div>
</div>

<!-- Tela de sucesso -->
<div class="confirmacao" id="confirmacao">
  <div class="success-icon">✓</div>
  <h1>Cadastro Concluído!</h1>
  <p>Cliente registrado com segurança no navegador (localStorage).</p>
  <button type="button" class="btn-primary" id="novoCadastro">Cadastrar Novo Cliente</button>
</div>

<!-- Conteúdo principal -->
<div class="container" id="mainContent">
  <h1 id="tituloAdminTrigger">
    Cadastro de Cliente
    <small style="font-size:0.75rem; color:#64748b; display:block; margin-top:6px;"></small>
  </h1>

  <form id="cadastroForm">
    <!-- todos os campos do formulário permanecem iguais -->
    <div class="form-group">
      <label for="nome">Nome completo</label>
      <input type="text" id="nome" placeholder="Ex: João Silva" required>
      <i class="fas fa-user input-icon"></i>
    </div>

    <div class="form-group">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="seuemail@exemplo.com" required>
      <i class="fas fa-envelope input-icon"></i>
    </div>

    <div class="form-group">
      <label for="telefone">Telefone / WhatsApp</label>
      <input type="tel" id="telefone" placeholder="(41) 99999-9999" required>
      <i class="fas fa-phone input-icon"></i>
    </div>

    <div class="form-group">
      <label for="endereco">Endereço</label>
      <input type="text" id="endereco" placeholder="Rua Exemplo, 123 - Bairro, Cidade" required>
      <i class="fas fa-map-marker-alt input-icon"></i>
    </div>

    <div class="form-group">
      <label for="dataNascimento">Data de nascimento</label>
      <input type="date" id="dataNascimento" required>
      <i class="fas fa-calendar-days input-icon"></i>
    </div>

    <button type="submit" class="btn-primary">Cadastrar com Sigilo</button>
  </form>

  <!-- Área administrativa (igual) -->
  <div id="areaAdmin">
    <h2><i class="fas fa-user-shield"></i> Área Administrativa</h2>
    <p style="color:#94a3b8; text-align:center;">Acesso restrito</p>

    <div class="admin-buttons">
      <button id="btnVerClientes" style="background:var(--danger);">Ver Todos os Clientes</button>
      <button id="btnLimparDados" style="background:var(--purple);">Limpar Todos os Dados</button>
      <button id="sairAdmin" style="background:#475569;">Sair da Área Admin</button>
    </div>

    <div id="listaClientes" style="display:none;">
      <h3 style="color:#60a5fa;">Clientes Cadastrados</h3>
      <div id="clientesTable"></div>
    </div>
  </div>
</div>

<script>
  // Todo o JavaScript permanece 100% igual ao que você enviou
  const SENHA_ADMIN_CORRETA = "clientesnuzzi26";

  // ... (todo o script que você colou continua aqui sem alteração)
</script>
</body>
</html>
