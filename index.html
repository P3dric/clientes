<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro de Clientes</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      width: 100%;
      max-width: 480px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    }

    .header {
      background: #4f46e5;
      color: white;
      padding: 28px 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    .header p {
      opacity: 0.9;
      font-size: 0.95rem;
    }

    .form-container {
      padding: 32px 30px;
    }

    .form-group {
      margin-bottom: 22px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #374151;
      font-weight: 500;
      font-size: 0.95rem;
    }

    input, select {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
      transition: all 0.2s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    .row {
      display: flex;
      gap: 20px;
    }

    .row > div {
      flex: 1;
    }

    .checkbox-container {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 25px 0 30px 0;
    }

    button {
      width: 100%;
      padding: 16px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
    }

    button:hover {
      background: #4338ca;
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
    }

    .footer {
      text-align: center;
      padding: 20px;
      color: #6b7280;
      font-size: 0.9rem;
      border-top: 1px solid #f3f4f6;
    }

    @media (max-width: 500px) {
      .row {
        flex-direction: column;
        gap: 22px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>Cadastro de Cliente</h1>
      <p>Preencha os dados corretamente</p>
    </div>

    <div class="form-container">
      <form>

        <div class="form-group">
          <label for="nome">Nome completo *</label>
          <input type="text" id="nome" name="nome" required placeholder="Ex: João Silva Santos">
        </div>

        <div class="row">
          <div class="form-group">
            <label for="cpf">CPF *</label>
            <input type="text" id="cpf" name="cpf" required placeholder="000.000.000-00">
          </div>
          
          <div class="form-group">
            <label for="nascimento">Data de nascimento</label>
            <input type="date" id="nascimento" name="nascimento">
          </div>
        </div>

        <div class="row">
          <div class="form-group">
            <label for="email">E-mail *</label>
            <input type="email" id="email" name="email" required placeholder="seuemail@exemplo.com">
          </div>
          
          <div class="form-group">
            <label for="telefone">Celular / WhatsApp</label>
            <input type="tel" id="telefone" name="telefone" placeholder="(41) 99999-9999">
          </div>
        </div>

        <div class="form-group">
          <label for="estado">Estado *</label>
          <select id="estado" name="estado" required>
            <option value="">Selecione...</option>
            <option value="AC">Acre</option>
            <option value="AL">Alagoas</option>
            <option value="AP">Amapá</option>
            <option value="AM">Amazonas</option>
            <option value="BA">Bahia</option>
            <option value="CE">Ceará</option>
            <option value="DF">Distrito Federal</option>
            <option value="ES">Espírito Santo</option>
            <option value="GO">Goiás</option>
            <option value="MA">Maranhão</option>
            <option value="MT">Mato Grosso</option>
            <option value="MS">Mato Grosso do Sul</option>
            <option value="MG">Minas Gerais</option>
            <option value="PA">Pará</option>
            <option value="PB">Paraíba</option>
            <option value="PR" selected>Paraná</option>
            <option value="PE">Pernambuco</option>
            <option value="PI">Piauí</option>
            <option value="RJ">Rio de Janeiro</option>
            <option value="RN">Rio Grande do Norte</option>
            <option value="RS">Rio Grande do Sul</option>
            <option value="RO">Rondônia</option>
            <option value="RR">Roraima</option>
            <option value="SC">Santa Catarina</option>
            <option value="SP">São Paulo</option>
            <option value="SE">Sergipe</option>
            <option value="TO">Tocantins</option>
          </select>
        </div>

        <div class="form-group">
          <label for="observacoes">Observações / preferências</label>
          <input type="text" id="observacoes" name="observacoes" placeholder="Ex: cliente VIP, prefere contato via WhatsApp...">
        </div>

        <div class="checkbox-container">
          <input type="checkbox" id="aceite" name="aceite" required>
          <label for="aceite">Li e aceito os <strong>termos de uso</strong> e <strong>política de privacidade</strong></label>
        </div>

        <button type="submit">Cadastrar Cliente</button>

      </form>
    </div>

    <div class="footer">
      Sistema de Cadastro • Curitiba © 2025
    </div>
  </div>

</body>
</html>
