<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro de Cliente</title>

  <style>
    :root {
      --primary: #4f46e5;
      --primary-dark: #4338ca;
      --primary-light: #6366f1;
      --text: #0f172a;
      --text-secondary: #475569;
      --text-light: #64748b;
      --bg: #f8fafc;
      --card: #ffffff;
      --border: #cbd5e1;
      --border-focus: #a5b4fc;
      --error: #ef4444;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      color: var(--text);
    }

    .container {
      background: var(--card);
      width: 100%;
      max-width: 480px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
      border: 1px solid var(--border);
    }

    .header {
      padding: 32px 32px 20px;
      text-align: center;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
    }

    .header h1 {
      font-size: 1.85rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .header p {
      font-size: 0.98rem;
      opacity: 0.9;
    }

    .form-content {
      padding: 32px;
    }

    .form-group {
      margin-bottom: 26px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.94rem;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .required::after {
      content: " *";
      color: var(--error);
      font-weight: 600;
    }

    input,
    select {
      width: 100%;
      padding: 13px 16px 13px 44px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      background: #ffffff;
      transition: all 0.18s ease;
      color: var(--text);
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
    }

    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      color: var(--text-light);
      pointer-events: none;
    }

    .input-wrapper {
      position: relative;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .checkbox-wrapper {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin: 28px 0 32px;
    }

    .checkbox-wrapper input {
      margin-top: 4px;
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
    }

    .checkbox-wrapper label {
      font-size: 0.94rem;
      line-height: 1.45;
      color: var(--text-secondary);
    }

    .checkbox-wrapper a {
      color: var(--primary);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    button {
      width: 100%;
      padding: 15px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.22s ease;
    }

    button:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(79, 70, 229, 0.22);
    }

    button:active {
      transform: translateY(0);
    }

    .footer {
      padding: 20px;
      text-align: center;
      font-size: 0.86rem;
      color: var(--text-light);
      border-top: 1px solid var(--border);
      background: #f9fafb;
    }

    @media (max-width: 480px) {
      .grid-2 {
        grid-template-columns: 1fr;
        gap: 26px;
      }
      .form-content {
        padding: 24px;
      }
      .header {
        padding: 28px 24px 16px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>Cadastro de Cliente</h1>
      <p>Preencha os campos com atenção</p>
    </div>

    <div class="form-content">
      <form novalidate>

        <div class="form-group">
          <label for="nome" class="required">Nome completo</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="7" r="4"/>
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            </svg>
            <input type="text" id="nome" name="nome" required minlength="3" placeholder="Ex: Ana Clara Oliveira">
          </div>
        </div>

        <div class="grid-2">
          <div class="form-group">
            <label for="nascimento">Data de nascimento</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              <input type="date" id="nascimento" name="nascimento">
            </div>
          </div>

          <div class="form-group">
            <label for="telefone" class="required">Celular / WhatsApp</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
              </svg>
              <input type="tel" id="telefone" name="telefone" required placeholder="(41) 99999-9999">
            </div>
          </div>
        </div>

        <div class="grid-2">
          <div class="form-group">
            <label for="email" class="required">E-mail</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
              <input type="email" id="email" name="email" required placeholder="exemplo@dominio.com">
            </div>
          </div>

          <div class="form-group">
            <label for="estado" class="required">Estado</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                <circle cx="12" cy="10" r="3"/>
              </svg>
              <select id="estado" name="estado" required>
                <option value="">Selecione...</option>
                <option value="AC">Acre</option>
                <option value="AL">Alagoas</option>
                <option value="AP">Amapá</option>
                <option value="AM">Amazonas</option>
                <option value="BA">Bahia</option>
                <option value="CE">Ceará</option>
                <option value="DF">Distrito Federal</option>
                <option value="ES">Espírito Santo</option>
                <option value="GO">Goiás</option>
                <option value="MA">Maranhão</option>
                <option value="MT">Mato Grosso</option>
                <option value="MS">Mato Grosso do Sul</option>
                <option value="MG">Minas Gerais</option>
                <option value="PA">Pará</option>
                <option value="PB">Paraíba</option>
                <option value="PR" selected>Paraná</option>
                <option value="PE">Pernambuco</option>
                <option value="PI">Piauí</option>
                <option value="RJ">Rio de Janeiro</option>
                <option value="RN">Rio Grande do Norte</option>
                <option value="RS">Rio Grande do Sul</option>
                <option value="RO">Rondônia</option>
                <option value="RR">Roraima</option>
                <option value="SC">Santa Catarina</option>
                <option value="SP">São Paulo</option>
                <option value="SE">Sergipe</option>
                <option value="TO">Tocantins</option>
              </select>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="observacoes">Observações</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-1"/>
              <polyline points="10 9 15 14 20 9"/>
            </svg>
            <input type="text" id="observacoes" name="observacoes" placeholder="Ex: prefere contato à tarde, cliente VIP...">
          </div>
        </div>

        <div class="checkbox-wrapper">
          <input type="checkbox" id="aceite" name="aceite" required>
          <label for="aceite">
            Li e concordo com os <a href="#">termos de uso</a> e a <a href="#">política de privacidade</a>
          </label>
        </div>

        <button type="submit">Cadastrar Cliente</button>

      </form>
    </div>

    <div class="footer">
      Sistema de Cadastro • Curitiba • 2026
    </div>
  </div>

</body>
</html>
