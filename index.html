<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistema Nuzzi • Acesso Restrito</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  
  <style>
    :root {
      --primary: #3b82f6;
      --danger: #ef4444;
      --purple: #7c3aed;
      --success: #22c55e;
      --dark: #0f172a;
      --gray: #334155;
      --light: #e2e8f0;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: var(--light);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 520px;
      margin: 2rem auto;
      background: #1e293b;
      padding: 2rem;
      border-radius: 12px;
      border: 1px solid var(--gray);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    h1 { 
      text-align: center; 
      margin-bottom: 1.5rem; 
      cursor: pointer;
      user-select: none;
    }
    .tabs { display: flex; background: #334155; border-radius: 8px; padding: 4px; margin-bottom: 1.5rem; }
    .tab { flex: 1; padding: 12px; text-align: center; border-radius: 6px; cursor: pointer; font-weight: 500; }
    .tab.active { background: var(--primary); color: white; }
    .form-group { position: relative; margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: 0.5rem; color: #94a3b8; font-size: 0.95rem; }
    .required { color: #ef4444; }
    .help-text {
      font-size: 0.85rem;
      color: #64748b;
      margin-top: 4px;
    }
    input, select {
      width: 100%;
      padding: 12px 12px 12px 42px;
      background: var(--dark);
      border: 1px solid var(--gray);
      border-radius: 8px;
      color: white;
      font-size: 1rem;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }
    .input-icon {
      position: absolute;
      left: 14px;
      top: 42px;
      color: #64748b;
      font-size: 1.1rem;
    }
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 1.05rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary:hover { background: #2563eb; transform: translateY(-2px); }

    /* Modal Admin */
    #modalLoginAdmin {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background: #1e293b;
      padding: 2rem;
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
      border: 1px solid #475569;
      text-align: center;
    }
    .confirmacao {
      text-align: center;
      padding: 3rem 1rem;
      display: none;
    }
    .success-icon {
      font-size: 5rem;
      color: var(--success);
      margin-bottom: 1rem;
    }

    #areaAdmin {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1.8rem;
      margin-top: 2rem;
      display: none;
    }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #475569; }
    th { background: #334155; color: #cbd5e1; }
    .admin-buttons { 
      display: flex; 
      gap: 8px; 
      flex-wrap: wrap; 
      margin: 1.5rem 0; 
    }
    .admin-buttons button {
      flex: 1; 
      min-width: 130px; 
      padding: 12px; 
      border: none; 
      border-radius: 8px;
      color: white; 
      cursor: pointer; 
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

<div class="container" id="mainContent">
  <h1 id="tituloAdminTrigger">Sistema Nuzzi</h1>

  <!-- Abas -->
  <div class="tabs">
    <div class="tab active" data-tab="cliente">Cliente</div>
    <div class="tab" data-tab="compra">Compras</div>
  </div>

  <!-- Formulário Cliente -->
  <form id="cadastroFormCliente" class="form-tab">
    <!-- ... (seus campos de cliente permanecem iguais) ... -->
    <div class="form-group">
      <label>Nome completo <span class="required">*</span></label>
      <input type="text" id="nome" placeholder="Ex: João Silva dos Santos" maxlength="80" required>
      <i class="fas fa-user input-icon"></i>
    </div>
    <div class="form-group">
      <label>CPF <span class="required">*</span></label>
      <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
      <i class="fas fa-id-card input-icon"></i>
    </div>
    <div class="form-group">
      <label>RG <span class="required">*</span></label>
      <input type="text" id="rg" placeholder="00.000.000-0" maxlength="12" required>
      <i class="fas fa-id-badge input-icon"></i>
    </div>
    <div class="form-group">
      <label>E-mail <span class="required">*</span></label>
      <input type="email" id="email" placeholder="seunome@gmail.com" maxlength="80" required>
      <i class="fas fa-envelope input-icon"></i>
    </div>
    <div class="form-group">
      <label>Telefone / WhatsApp <span class="required">*</span></label>
      <input type="tel" id="telefone" placeholder="(41) 99999-9999" maxlength="15" required>
      <i class="fas fa-phone input-icon"></i>
    </div>
    <div class="form-group">
      <label>Endereço</label>
      <input type="text" id="endereco" placeholder="Rua, número, bairro, cidade" maxlength="120">
      <i class="fas fa-map-marker-alt input-icon"></i>
    </div>
    <div class="form-group">
      <label>Data de nascimento</label>
      <input type="date" id="dataNascimento">
      <i class="fas fa-calendar-days input-icon"></i>
    </div>

    <button type="submit" class="btn-primary">Cadastrar Cliente</button>
  </form>

  <!-- Formulário Compra (mantido igual) -->
  <form id="cadastroFormCompra" class="form-tab hidden">
    <!-- ... seus campos de compra ... -->
    <div class="form-group">
      <label>Nome do Cliente <span class="required">*</span></label>
      <input type="text" id="clienteCompra" placeholder="Nome completo" maxlength="80" required>
      <i class="fas fa-user input-icon"></i>
    </div>
    <div class="form-group">
      <label>Telefone / WhatsApp <span class="required">*</span></label>
      <input type="tel" id="telefoneCompra" placeholder="(41) 99999-9999" maxlength="15" required>
      <i class="fas fa-phone input-icon"></i>
    </div>
    <div class="form-group">
      <label>Produto <span class="required">*</span></label>
      <select id="produtoCompra" required></select>
    </div>
    <div class="form-group">
      <label>Quantidade <span class="required">*</span></label>
      <input type="number" id="quantidadeCompra" min="1" value="1" required>
    </div>
    <div class="form-group">
      <label>Valor Total (R$)</label>
      <input type="text" id="valorTotalCompra" readonly style="background:#334155;">
    </div>

    <button type="submit" class="btn-primary">Registrar Compra</button>
  </form>

  <!-- ==================== ÁREA ADMINISTRATIVA ==================== -->
  <div id="areaAdmin">
    <h2><i class="fas fa-user-shield"></i> Área Administrativa</h2>
    <div class="admin-buttons">
      <button id="btnVerClientes" style="background:#3b82f6;">Ver Clientes</button>
      <button id="btnVerProdutos" style="background:#8b5cf6;">Ver Produtos</button>
      <button id="btnVerVendas"   style="background:#22c55e;">Ver Vendas</button>
      <button id="btnVerCompras"  style="background:#eab308;">Ver Compras</button>
      <button id="btnNovoProduto" style="background:var(--purple);">+ Novo Produto</button>
      <button id="btnLimparDados" style="background:var(--danger);">Limpar Tudo</button>
      <button id="sairAdmin" style="background:#475569;">Sair</button>
    </div>
    <div id="conteudoAdmin"></div>
  </div>
</div>

<!-- ==================== MODAL LOGIN ADMIN ==================== -->
<div id="modalLoginAdmin">
  <div class="modal-content">
    <h2><i class="fas fa-lock"></i> Acesso Administrativo</h2>
    <p style="margin: 15px 0; color:#94a3b8;">Digite a senha de administrador</p>
    <input type="password" id="senhaAdmin" placeholder="Senha" style="margin-bottom: 15px; text-align:center;">
    <button id="btnEntrarAdmin" class="btn-primary">Entrar</button>
    <button id="btnCancelarAdmin" style="background:#475569; margin-top:10px; width:100%; padding:12px; border:none; border-radius:8px; color:white; cursor:pointer;">Cancelar</button>
  </div>
</div>

<!-- Tela de Sucesso -->
<div id="confirmacao" class="confirmacao">
  <i class="fas fa-check-circle success-icon"></i>
  <h2 id="msgSucesso">Sucesso!</h2>
  <p id="subMsg"></p>
  <button onclick="fecharSucesso()" class="btn-primary" style="margin-top:20px;">Voltar ao Sistema</button>
</div>

<script>
// ====================== CONFIGURAÇÕES ======================
const SENHA_ADMIN = "clientesnuzzi26";

// ====================== ELEMENTOS ======================
const modalLoginAdmin = document.getElementById('modalLoginAdmin');
const areaAdmin = document.getElementById('areaAdmin');
const tituloAdminTrigger = document.getElementById('tituloAdminTrigger');

// ====================== MÁSCARA DE TELEFONE ======================
function aplicarMascaraTelefone(input) {
  input.addEventListener('input', function(e) {
    let valor = e.target.value.replace(/\D/g, '');
    if (valor.length > 11) valor = valor.substring(0, 11);
    if (valor.length <= 2) {
      e.target.value = valor;
    } else if (valor.length <= 7) {
      e.target.value = `(${valor.slice(0,2)}) ${valor.slice(2)}`;
    } else {
      e.target.value = `(${valor.slice(0,2)}) ${valor.slice(2,7)}-${valor.slice(7)}`;
    }
  });
}

// Aplicar máscara
aplicarMascaraTelefone(document.getElementById('telefone'));
aplicarMascaraTelefone(document.getElementById('telefoneCompra'));

// ====================== ABRIR MODAL ADMIN ======================
tituloAdminTrigger.addEventListener('click', () => {
  modalLoginAdmin.style.display = 'flex';
  document.getElementById('senhaAdmin').focus();
});

// ====================== LOGIN ADMIN ======================
document.getElementById('btnEntrarAdmin').addEventListener('click', () => {
  const senhaDigitada = document.getElementById('senhaAdmin').value.trim();
  
  if (senhaDigitada === SENHA_ADMIN) {
    modalLoginAdmin.style.display = 'none';
    areaAdmin.style.display = 'block';
    alert("✅ Acesso administrativo liberado!");
  } else {
    alert("❌ Senha incorreta!");
    document.getElementById('senhaAdmin').value = '';
    document.getElementById('senhaAdmin').focus();
  }
});

document.getElementById('btnCancelarAdmin').addEventListener('click', () => {
  modalLoginAdmin.style.display = 'none';
  document.getElementById('senhaAdmin').value = '';
});

// Fechar com ESC
document.addEventListener('keydown', (e) => {
  if (e.key === "Escape" && modalLoginAdmin.style.display === 'flex') {
    modalLoginAdmin.style.display = 'none';
  }
});

// ====================== SAIR DO ADMIN ======================
document.getElementById('sairAdmin').addEventListener('click', () => {
  areaAdmin.style.display = 'none';
  alert("Você saiu da área administrativa.");
});

// ====================== TROCA DE ABAS ======================
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    
    document.getElementById('cadastroFormCliente').classList.add('hidden');
    document.getElementById('cadastroFormCompra').classList.add('hidden');
    
    if (tab.dataset.tab === 'cliente') {
      document.getElementById('cadastroFormCliente').classList.remove('hidden');
    } else {
      document.getElementById('cadastroFormCompra').classList.remove('hidden');
    }
  });
});

// ====================== RESTANTE DO SEU CÓDIGO (Cadastro, Compras, etc.) ======================
// (coloque aqui todo o resto do seu JavaScript de cadastro de cliente, compra, atualizarProdutosCompra, etc.)

// Exemplo mínimo para não dar erro:
document.getElementById('cadastroFormCliente').addEventListener('submit', e => {
  e.preventDefault();
  alert("Cliente cadastrado com sucesso! (funcionalidade mantida)");
  e.target.reset();
});

document.getElementById('cadastroFormCompra').addEventListener('submit', e => {
  e.preventDefault();
  alert("Compra registrada com sucesso! (funcionalidade mantida)");
  e.target.reset();
});

function mostrarSucesso(titulo, subtitulo) {
  document.getElementById('msgSucesso').textContent = titulo;
  document.getElementById('subMsg').textContent = subtitulo;
  document.getElementById('confirmacao').style.display = 'block';
}

function fecharSucesso() {
  document.getElementById('confirmacao').style.display = 'none';
}

// Inicialização
console.log("Sistema Nuzzi carregado - Clique no título 'Sistema Nuzzi' para abrir o Admin");
</script>
</body>
</html>
