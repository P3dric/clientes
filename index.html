<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro de Clientes • Sigiloso</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <!-- Aqui você coloca o novo link pro seu arquivo -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="confirmacao" id="confirmacao" style="display: none;">
  <div class="success-icon">✓</div>
  <h1>Cadastro Concluído!</h1>
  <p class="mensagem-sucesso">Cliente registrado com segurança no seu navegador.</p>
  <p style="color: #a3c4ff; font-size: 0.95rem; margin: 1rem 0 1.5rem;">
    Os dados estão salvos localmente.<br>Para cadastrar outro, clique abaixo.
  </p>
  <button type="button" class="btn-primary" id="novoCadastro">
    Cadastrar Novo Cliente
  </button>
</div>

<div class="container">
  <h1>Cadastro de Cliente</h1>

  <form id="cadastroForm">
    <div class="form-group">
      <label for="nome">Nome completo</label>
      <input type="text" id="nome" placeholder="Ex: Pedro Almeida Santos" required>
      <i class="fas fa-user input-icon"></i>
    </div>

    <div class="form-group">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="seuemail@exemplo.com" required>
      <i class="fas fa-envelope input-icon"></i>
    </div>

    <div class="form-group">
      <label for="telefone">Telefone / WhatsApp</label>
      <input type="tel" id="telefone" placeholder="(41) 99999-9999" pattern=".{14,15}" required>
      <i class="fas fa-phone input-icon"></i>
    </div>

    <div class="form-group">
      <label for="endereco">Endereço</label>
      <input type="text" id="endereco" placeholder="Rua das Flores, 198 - Centro" required>
      <i class="fas fa-home input-icon"></i>
    </div>

    <div class="form-group">
      <label for="dataNascimento">Data de nascimento</label>
      <input type="date" id="dataNascimento" required>
      <i class="fas fa-calendar-days input-icon"></i>
    </div>

    <button type="submit" class="btn-primary">Cadastrar com Sigilo</button>
  </form>
</div>

<script>
// Máscara de telefone brasileira (11 dígitos com DDD)
document.getElementById('telefone').addEventListener('input', function(e) {
  let v = e.target.value.replace(/\D/g, '');
  if (v.length > 11) v = v.substring(0, 11);
  v = v.replace(/^(\d{2})(\d)/g, '($1) $2');
  v = v.replace(/(\d)(\d{4})$/, '$1-$2');
  e.target.value = v;
});

const form = document.getElementById('cadastroForm');
const confirmacao = document.getElementById('confirmacao');
const novoCadastroBtn = document.getElementById('novoCadastro');

function salvarCliente(cliente) {
  let clientes = JSON.parse(localStorage.getItem('clientes_v2') || '[]');
  clientes.push(cliente);
  localStorage.setItem('clientes_v2', JSON.stringify(clientes));
}

form.addEventListener('submit', e => {
  e.preventDefault();
  
  const cliente = {
    nome: document.getElementById('nome').value.trim(),
    email: document.getElementById('email').value.trim(),
    telefone: document.getElementById('telefone').value.trim(),
    endereco: document.getElementById('endereco').value.trim(),
    dataNascimento: document.getElementById('dataNascimento').value,
    cadastradoEm: new Date().toISOString()
  };

  if (!cliente.nome || !cliente.email || !cliente.telefone || !cliente.endereco || !cliente.dataNascimento) {
    alert('Por favor, preencha todos os campos.');
    return;
  }

  salvarCliente(cliente);
  
  form.reset();
  form.style.display = 'none';
  confirmacao.style.display = 'block';
});

novoCadastroBtn.addEventListener('click', () => {
  confirmacao.style.display = 'none';
  form.style.display = 'block';
});
</script>
</body>
</html>
