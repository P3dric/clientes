<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Clientes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #0d1117;
            color: #e6e6e6;
            min-height: 100vh;
            padding: 40px 20px;
            background-image: 
                radial-gradient(circle at 15% 20%, rgba(88, 101, 242, 0.08) 0%, transparent 25%),
                radial-gradient(circle at 85% 70%, rgba(88, 101, 242, 0.06) 0%, transparent 30%);
            background-attachment: fixed;
        }

        .container {
            background-color: #161b22;
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            margin: 0 auto 30px;
            border: 1px solid #30363d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        h1 {
            font-size: 28px;
            color: #58a6ff;
            margin-bottom: 32px;
            text-align: center;
            font-weight: 600;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #a5b4fc;
            font-size: 14px;
            font-weight: 500;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="date"] {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 20px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #e6edf3;
            font-size: 16px;
            transition: all 0.2s ease;
        }

        input:focus {
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #388bfd, #79c0ff);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-top: 12px;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(88, 166, 255, 0.35);
            background: linear-gradient(135deg, #79c0ff, #a5d6ff);
        }

        .confirmacao {
            background-color: #161b22;
            border: 1px solid #30363d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            padding: 40px 30px;
            border-radius: 16px;
            max-width: 420px;
            margin: 0 auto 40px;
            text-align: center;
            display: none;
        }

        .mensagem-sucesso {
            font-size: 20px;
            color: #7ee787;
            margin: 24px 0 16px;
            font-weight: 500;
        }

        #listaClientes {
            display: none;
            margin: 24px auto 0;
            max-width: 420px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
            max-height: 340px;
            overflow-y: auto;
        }

        #listaClientes div {
            padding: 14px 0;
            border-bottom: 1px solid #21262d;
            font-size: 14.5px;
            line-height: 1.5;
        }

        #listaClientes div:last-child {
            border-bottom: none;
        }

        #listaClientes strong {
            color: #58a6ff;
        }

        #voltarCadastro {
            color: #58a6ff;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            margin-top: 28px;
            transition: color 0.2s;
        }

        #voltarCadastro:hover {
            color: #79c0ff;
            text-decoration: underline;
        }

        #mostrarClientes {
            margin-top: 28px;
            background: linear-gradient(135deg, #238636, #3fb950);
            box-shadow: 0 4px 12px rgba(63, 185, 80, 0.2);
        }

        #mostrarClientes:hover {
            background: linear-gradient(135deg, #3fb950, #56d364);
            box-shadow: 0 6px 20px rgba(63, 185, 80, 0.35);
        }
    </style>
</head>
<body>

    <div class="confirmacao" id="confirmacao">
        <h1>Cadastro Concluído!</h1>
        <p class="mensagem-sucesso">Cliente registrado com sucesso.</p>
        <p style="color: #8b949e; font-size: 15px; line-height: 1.5;">
            Os dados foram salvos localmente no navegador.<br>
            Tudo protegido e criptografado pelo navegador.
        </p>
        <a href="#" id="voltarCadastro">← Cadastrar novo cliente</a>
    </div>

    <div class="container">
        <h1>Cadastro de Cliente</h1>
        <form id="cadastroForm">
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" placeholder="João Silva" required>

            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="joao.silva@email.com" required>

            <label for="telefone">Telefone</label>
            <input type="tel" id="telefone" placeholder="(11) 98765-4321" required>

            <label for="endereco">Endereço</label>
            <input type="text" id="endereco" placeholder="Rua das Flores, 245 - Centro" required>

            <label for="dataNascimento">Data de Nascimento</label>
            <input type="date" id="dataNascimento" required>

            <button type="submit">Cadastrar Cliente</button>
        </form>

        <button type="button" id="mostrarClientes">
            Ver todos os clientes cadastrados
        </button>

        <div id="listaClientes">
            <!-- Lista aparece aqui -->
        </div>
    </div>

    <!-- O JavaScript permanece exatamente o mesmo que você tinha -->
    <script>
        // ... seu código JavaScript original aqui (sem alterações necessárias) ...
        // Apenas cole o <script> que você já tinha
    </script>

</body>
</html>
