<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro de Produtos • Nuzzi</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  
  <style>
    :root {
      --primary: #3b82f6;
      --dark: #0f172a;
      --gray: #334155;
      --light: #e2e8f0;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: var(--light);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 480px;
      margin: 2rem auto;
      background: #1e293b;
      padding: 2rem;
      border-radius: 12px;
      border: 1px solid var(--gray);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    h1 { text-align: center; margin-bottom: 2rem; color: #60a5fa; }
    .form-group { position: relative; margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: 0.5rem; color: #94a3b8; }
    input, select {
      width: 100%;
      padding: 12px 12px 12px 42px;
      background: var(--dark);
      border: 1px solid var(--gray);
      border-radius: 8px;
      color: white;
    }
    .input-icon { position: absolute; left: 14px; top: 42px; color: #64748b; font-size: 1.1rem; }
    .btn-primary, .btn-secondary {
      width: 100%; padding: 14px; border: none; border-radius: 8px; color: white; cursor: pointer; margin-top: 10px;
    }
    .btn-primary { background: var(--primary); }
    .btn-secondary { background: #475569; }
  </style>
</head>
<body>

<div class="container">
  <h1><i class="fas fa-box"></i> Cadastro de Produto</h1>
  
  <form id="cadastroFormProduto">
    <div class="form-group">
      <label>Nome do Produto</label>
      <input type="text" id="nomeProduto" placeholder="Ex: Camiseta Premium" required>
      <i class="fas fa-tag input-icon"></i>
    </div>
    <div class="form-group">
      <label>Preço de Venda (R$)</label>
      <input type="number" step="0.01" id="precoProduto" placeholder="89.90" required>
      <i class="fas fa-dollar-sign input-icon"></i>
    </div>
    <div class="form-group">
      <label>Estoque Inicial</label>
      <input type="number" id="estoqueProduto" placeholder="50" value="0" required>
      <i class="fas fa-warehouse input-icon"></i>
    </div>
    <div class="form-group">
      <label>Categoria</label>
      <select id="categoriaProduto">
        <option value="Camisetas">Camisetas</option>
        <option value="Calças">Calças</option>
        <option value="Calçados">Calçados</option>
        <option value="Acessórios">Acessórios</option>
        <option value="Outros">Outros</option>
      </select>
    </div>
    <button type="submit" class="btn-primary">Salvar Produto</button>
    <button type="button" id="btnCancelar" class="btn-secondary">Cancelar</button>
  </form>
</div>

<script>
document.getElementById('cadastroFormProduto').addEventListener('submit', function(e) {
  e.preventDefault();

  const produto = {
    id: Date.now(),
    nome: document.getElementById('nomeProduto').value.trim(),
    preco: parseFloat(document.getElementById('precoProduto').value),
    estoque: parseInt(document.getElementById('estoqueProduto').value) || 0,
    categoria: document.getElementById('categoriaProduto').value,
    cadastradoEm: new Date().toISOString()
  };

  let produtos = JSON.parse(localStorage.getItem('produtos') || '[]');
  produtos.push(produto);
  localStorage.setItem('produtos', JSON.stringify(produtos));

  alert(`✅ Produto "${produto.nome}" cadastrado com sucesso!`);
  this.reset();
});

document.getElementById('btnCancelar').addEventListener('click', () => {
  if (confirm("Deseja cancelar o cadastro?")) {
    window.close();   // fecha a aba
    // ou window.location.href = "seu-arquivo-principal.html";
  }
});
</script>
</body>
</html>
